name: Paddleup
options:
  bundleIdPrefix: app.paddleup
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # set in Xcode locally
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  PaddleupShared:
    path: PaddleupShared
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  Paddleup:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Paddleup
    info:
      path: Paddleup/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7, location-services, gps, accelerometer]
        UIBackgroundModes: [location, audio, fetch]
        NSLocationAlwaysAndWhenInUseUsageDescription: "Paddleup uses your location to record your route, distance, and pace while you paddle."
        NSLocationWhenInUseUsageDescription: "Paddleup uses your location to record your route, distance, and pace while you paddle."
        NSMotionUsageDescription: "Paddleup uses motion sensors to count strokes and measure stroke rate."
        NSHealthShareUsageDescription: "Paddleup reads your heart rate to show effort during paddling sessions."
        NSHealthUpdateUsageDescription: "Paddleup writes finished paddling workouts to Apple Health."
        NSMicrophoneUsageDescription: "Paddleup listens for the steerer's “hut” call to detect side switches. Audio is processed on-device only and never recorded."
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    entitlements:
      path: Paddleup/Paddleup.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.weatherkit: true
        com.apple.developer.applesignin: [Default]
        aps-environment: development
    dependencies:
      - package: PaddleupShared
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions

  PaddleupTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PaddleupTests
    dependencies:
      - target: Paddleup
      - package: PaddleupShared
