name: Wear OS

on:
  pull_request:
    paths: ["wear/**", ".github/workflows/wear.yml"]
  push:
    branches: [main]
    paths: ["wear/**", ".github/workflows/wear.yml"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wear
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: imuatrak-wear-debug
          path: wear/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
