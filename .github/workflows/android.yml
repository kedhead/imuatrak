name: Android

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stub google-services.json
        run: |
          mkdir -p app
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "paddleup-ci",
              "storage_bucket": "paddleup-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": { "package_name": "app.paddleup.debug" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "stub" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:1111111111111111111111",
                  "android_client_info": { "package_name": "app.paddleup" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "stub" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Assemble debug + run unit tests
        run: ./gradlew :shared:test :app:assembleDebug --stacktrace
