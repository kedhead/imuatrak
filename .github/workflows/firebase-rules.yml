name: Deploy Firebase rules

on:
  push:
    branches: [main]
    paths:
      - "firebase/firestore.rules"
      - "firebase/storage.rules"
      - "firebase/firestore.indexes.json"
      - ".github/workflows/firebase-rules.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Google credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      # Deploy security rules FIRST and on their own. Rules are the critical
      # path for the app working; they must never be blocked by an unrelated
      # index problem (a bad index once failed the whole combined deploy and
      # silently left stale rules in production).
      - name: Deploy Firestore + Storage security rules
        run: firebase deploy --only firestore:rules,storage --project imuatrak
        working-directory: firebase

      # Indexes deploy separately. If this fails it should NOT mask a
      # successful rules deploy, so it runs as its own step afterward.
      - name: Deploy Firestore indexes
        run: firebase deploy --only firestore:indexes --project imuatrak
        working-directory: firebase
