name: App

on:
  pull_request:
    paths-ignore: ["firebase/**", "web/**"]
  push:
    branches: [main]
    paths-ignore: ["firebase/**", "web/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20.19"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --ci
