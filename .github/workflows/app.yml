name: App

on:
  pull_request:
    paths-ignore: ["firebase/**", "web/**"]
  push:
    branches: [main]
    paths-ignore: ["firebase/**", "web/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20.19"
          cache: "yarn"
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Typecheck
        run: yarn typecheck
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test --ci
