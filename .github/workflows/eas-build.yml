name: EAS Build (internal)

# Manually triggered from the Actions tab. Produces a fresh native build
# (e.g. a new internal/TestFlight build) that includes the latest committed
# JavaScript. Use this when a change touches native config, or to ship a build
# that is OTA-update capable. Requires an EXPO_TOKEN repository secret
# (expo.dev → Account Settings → Access Tokens).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        options: [preview, development, production]
        default: preview
      platform:
        description: "Platform to build"
        type: choice
        options: [all, android, ios]
        default: all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20.19"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Trigger EAS build
        run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive --no-wait
